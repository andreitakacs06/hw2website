<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Andrei Takacs | Contact</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="home-page contact-page">
    <header>
      <h1>Contact</h1>
      <nav aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="overview.html">Overview</a></li>
          <li><a href="cv.html">CV</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="card.html">Card</a></li>
          <li><a href="chatbot.html">Chatbot</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section aria-labelledby="contact-form-heading">
        <h2 id="contact-form-heading">Send a Message</h2>
        <form action="#" method="post">
          <fieldset>
            <legend>Contact Details</legend>

            <p>
              <label for="name">Name</label>
              <input
                type="text"
                id="name"
                name="name"
                required
                placeholder="Enter your full name"
              />
            </p>

            <p>
              <label for="email">Email</label>
              <input
                type="email"
                id="email"
                name="email"
                required
                placeholder="name@example.com"
              />
            </p>

            <p>
              <label for="message">Message</label>
              <textarea
                id="message"
                name="message"
                required
                placeholder="Write your message"
              ></textarea>
            </p>
          </fieldset>

          <fieldset>
            <legend>Contact Reason</legend>

            <p>
              <input
                type="radio"
                id="reason-job"
                name="contact-reason"
                value="job-opportunity"
                required
              />
              <label for="reason-job">Job Opportunity</label>
            </p>

            <p>
              <input
                type="radio"
                id="reason-project"
                name="contact-reason"
                value="project-collaboration"
              />
              <label for="reason-project">Project Collaboration</label>
            </p>

            <p>
              <input
                type="radio"
                id="reason-question"
                name="contact-reason"
                value="general-question"
              />
              <label for="reason-question">General Question</label>
            </p>
          </fieldset>

          <p>
            <button type="submit">Send Message</button>
          </p>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Andrei Takacs</p>
    </footer>
  </body>
</html>
