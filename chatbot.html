<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Andrei Takacs | Chatbot</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="chatbot.css" />
  </head>
  <body class="home-page chatbot-page">
    <header>
      <h1>Andrei Takacs</h1>
      <nav aria-label="Main navigation">
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="overview.html">Overview</a></li>
          <li><a href="cv.html">CV</a></li>
          <li><a href="projects.html">Projects</a></li>
          <li><a href="card.html">Card</a></li>
          <li><a href="chatbot.html">Chatbot</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="chatbot-shell" aria-labelledby="chatbot-heading">
        <div class="chatbot-intro">
          <p class="chatbot-kicker">Simple site assistant</p>
          <h2 id="chatbot-heading">Ask about Andrei's site</h2>
          <p>
            Type a question and the chatbot will match it to a small question bank.
          </p>
        </div>

        <div class="chat-window" id="chat-window" aria-live="polite" aria-label="Chat conversation"></div>

        <form id="chat-form" class="chat-form">
          <label for="chat-input">Your question</label>
          <div class="chat-form-row">
            <input id="chat-input" name="chat-input" type="text" placeholder="Ask something..." autocomplete="off" />
            <button type="submit">Send</button>
          </div>
          <p class="chat-feedback" id="chat-feedback"></p>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; 2026 Andrei Takacs</p>
    </footer>

    <script src="chatbot.js"></script>
  </body>
</html>
